[package]
name = "server"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
quinn = "0.11.9"
rkyv = { version = "0.8.16", features = ["alloc"] }
tokio = { version = "1.52.3", features = ["rt", "rt-multi-thread", "macros"] }
rcgen = "0.14.8"
rustls = "0.23.40"
uuid = { version = "1.23.1", features = ["v4"] }
rand = "0.10.1"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
